services:
  caddy:
    image: caddy:2.8-alpine
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro

  frontend:
    image: oven/bun:alpine
    working_dir: /app/ui
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HMR_HOST: "localhost"
      VITE_HMR_PORT: "8080"
      VITE_HMR_PROTOCOL: "ws"
    command: sh -c "bun install && bun run dev"
    volumes:
      - ./:/app
      - ui_node_modules:/app/ui/node_modules

  backend:
    image: golang:1.24-alpine
    working_dir: /app
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017
      SESSION_TTL_HOURS: "168"
    command: sh -c "go install github.com/air-verse/air@v1.52.3 && air -c .air.toml"
    volumes:
      - ./:/app
      - go_cache:/go/pkg/mod

  mongo:
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "27017:27017"

volumes:
  ui_node_modules:
  go_cache:
